<!DOCTYPE html>
<html>
<head>
    <title>我的第一个作品</title>
    <style>
        body {
            background-color: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #16213e;
            color: #e6e6e6;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            font-family: 'Microsoft YaHei', sans-serif;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-left: 5px solid #e94560;
        }
        h1 {
            color: #e94560;
            margin-bottom: 20px;
        }
        p {
            line-height: 1.8;
            font-size: 18px;
        }
        .highlight {
            color: #f5c542;
            font-weight: bold;
        }
        button {
            background-color: #e94560;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 25px;
            transition: all 0.3s;
            font-weight: bold;
        }
        button:hover {
            background-color: #ff6b6b;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔥 我是 [戴大富]</h1>
        <p>今天，我亲手写下了这个页面。</p>
        <p>我知道<span class="highlight">前端</span>是什么了。</p>
        <p>它是一个<span class="highlight">能让想法变成画面</span>的工具。</p>
        <button onclick="changeText()">点我一下</button>
    </div>

    <script>
        function changeText() {
            document.querySelector('p').innerHTML = '你看，<span class="highlight">我让页面动起来了</span>。';
        }
    </script>
</body>
</html>
